model_path: ./deploy/best.onnx
input_width: 1280
input_height: 736
conf_threshold: 0.25
iou_threshold: 0.45
num_classes: 10
class_names:
  - person
  - rider
  - car
  - truck
  - bus
  - train
  - motor
  - bike
  - traffic light
  - traffic sign
thread_num: 4
use_letterbox: true
# 0 disables video frame sampling and runs detection on every frame.
video_detect_fps: 4.0
# dynamic adapts the ONNX sampling stride; fixed keeps the base stride.
video_stride_mode: dynamic
video_onnx_async: true
client_max_body_mb: 256
